name: Builds

# Desktop targets cannot be cross-compiled, so each platform builds on its
# own runner. Tag pushes (v*) attach every artifact to the GitHub release;
# manual dispatch just produces the artifacts.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.6'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/readme.app \
            readme-macos-universal.zip
      - uses: actions/upload-artifact@v4
        with:
          name: readme-macos-universal
          path: readme-macos-universal.zip

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip runner folder
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath readme-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: readme-windows-x64
          path: readme-windows-x64.zip

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Tar bundle
        run: tar czf readme-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: readme-linux-x64
          path: readme-linux-x64.tar.gz

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - name: Zip web build
        run: cd build && zip -rq ../readme-web.zip web
      - uses: actions/upload-artifact@v4
        with:
          name: readme-web
          path: readme-web.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows, build-linux, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Attach artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload '${{ github.ref_name }}' \
            readme-macos-universal.zip \
            readme-windows-x64.zip \
            readme-linux-x64.tar.gz \
            readme-web.zip \
            --repo '${{ github.repository }}' --clobber
